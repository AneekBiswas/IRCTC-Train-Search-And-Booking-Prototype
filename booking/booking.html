<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles/bookingStyle.css" />
</head>

<body>

    <div class="container">
        <div class="header">
            <div class="logo4">
            <img src="../pictures/logo1.png" alt="Logo"  />
            </div>
        </div>
        <div class="stepper">

  <div class="step active">
    <div class="circle">1</div>
    <span>Search Trains</span>
  </div>

  <div class="line2 active"></div>

  <div class="step active">
    <div class="circle">2</div>
    <span>Select a Train</span>
  </div>

  <div class="line2 active"></div>

  <div class="step active">
    <div class="circle">3</div>
    <span>Booking</span>
  </div>
</div>
</div>
        <div class="summary" id="summary"></div>

        <div id="train" readonly ></div>
        <div id="from" readonly ></div>
        <div id="to" readonly ></div>
        <div id="date" readonly ></div>

        <div id="passengers"></div>

    </div>

    <script src="booking.js"></script>
</body>
</html>
