<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Train Search</title>
    <link rel="stylesheet" href="./styles/indexStyle.css" />
</head>

<body>

    <div class="container">
        <h2>🚆 Train Search</h2>

        <input id="from" placeholder="From Station" list="station-list-from" autocomplete="off" />
        <datalist id="station-list-from"></datalist>

        <input id="to" placeholder="To Station" list="station-list-to" autocomplete="off" />
        <datalist id="station-list-to"></datalist>
        <input id="date" type="date" />
        <select id="sortBy">
            <option value="">Sort By</option>
            <option value="fare">Fare</option>
            <option value="time">Journey Time</option>
        </select>
        <select id="sortOrder">
            <option value="asc">Ascending</option>
            <option value="desc">Descending</option>
        </select>
        <button onclick="searchTrains()">Search</button>

        <div class="error" id="error"></div>
        <div class="results" id="results"></div>
    </div>
</body>
    <script src="script.js"></script>
</html>
